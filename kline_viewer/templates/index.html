<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K线图表展示</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="header">
        <h1>K线图表</h1>
        
        <div class="input-group">
            <label>交易所:</label>
            <select id="exchange">
                <option value="OKX" selected>OKX</option>
                <option value="BINANCE">BINANCE</option>
                <option value="CFFEX">CFFEX</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>类型:</label>
            <select id="instType">
                <option value="SPOT" selected>SPOT</option>
                <option value="SWAP">SWAP</option>
                <option value="FUTURES">FUTURES</option>
                <option value="PERP">PERP</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>交易对:</label>
            <input type="text" id="symbol" value="BTC-USDT" placeholder="BTC-USDT">
        </div>
        
        <div class="input-group">
            <label>周期:</label>
            <select id="period">
                <option value="1m">1分钟</option>
                <option value="5m">5分钟</option>
                <option value="15m">15分钟</option>
                <option value="1h">1小时</option>
                <option value="4h">4小时</option>
                <option value="1d">1天</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>开始时间:</label>
            <input type="date" id="startTime">
        </div>
        
        <div class="input-group">
            <label>结束时间:</label>
            <input type="date" id="endTime">
        </div>
        
        <button class="btn" id="loadBtn">加载数据</button>
    </div>
    
    <div class="indicators-panel">
        <span style="color: #aaa; font-size: 12px;">技术指标:</span>
        <label><input type="checkbox" id="showSMA5" class="indicator-toggle"> SMA(5)</label>
        <label><input type="checkbox" id="showSMA10" class="indicator-toggle"> SMA(10)</label>
        <label><input type="checkbox" id="showSMA20" class="indicator-toggle" checked> SMA(20)</label>
        <label><input type="checkbox" id="showSMA60" class="indicator-toggle"> SMA(60)</label>
        <label><input type="checkbox" id="showEMA12" class="indicator-toggle"> EMA(12)</label>
        <label><input type="checkbox" id="showEMA26" class="indicator-toggle"> EMA(26)</label>
        <label><input type="checkbox" id="showBB" class="indicator-toggle"> 布林带</label>
        <label><input type="checkbox" id="showRSI" class="indicator-toggle" data-type="RSI"> RSI</label>
        <label><input type="checkbox" id="showMACD" class="indicator-toggle" data-type="MACD"> MACD</label>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <div class="chart-container">
        <div id="mainChart"></div>
        <div id="volumeChart"></div>
        <div id="indicatorChart"></div>
    </div>
    
    <div class="info-panel">
        <span id="dataInfo">暂无数据</span>
        <span class="status" id="status">就绪</span>
    </div>
    
    <div id="tooltip" class="tooltip"></div>
    <div id="signalPopup" class="signal-popup"></div>
    <div id="legendBox" class="legend-box">
        <div class="legend-item">
            <span class="legend-icon buy">▲</span>
            <span>买入信号</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon sell">▼</span>
            <span>卖出信号</span>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
